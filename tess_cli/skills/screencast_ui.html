<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TESS Remote V2</title>
    <style>
        :root {
            --glass-bg: rgba(20, 20, 20, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
            --text-main: #ffffff;
            --text-dim: #aaaaaa;
        }

        body, html {
            margin: 0; padding: 0;
            background: #050505;
            height: 100%; width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none; /* Prevent browser pinch-zoom */
        }

        /* Screen Container */
        #screen-container {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        #stream {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            transform-origin: 0 0; /* Important for matrix transform */
            will-change: transform;
        }

        /* UI Layer */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Let touches pass through to screen */
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px; box-sizing: border-box;
        }

        /* Header / Status */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: auto;
        }

        .status-pill {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 8px 16px; border-radius: 20px;
            display: flex; gap: 8px; align-items: center;
            font-size: 14px; color: var(--text-main);
        }
        
        .dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 8px #00ff00; }
        .mode-text { color: var(--accent); font-weight: bold; font-size: 12px; text-transform: uppercase; }

        /* Media Controls (Floating Right) */
        .media-dock {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px;
            display: flex; flex-direction: column; gap: 15px;
            pointer-events: auto;
        }

        .btn-icon {
            background: none; border: none; color: var(--text-main);
            font-size: 20px; cursor: pointer; opacity: 0.7;
            transition: 0.2s;
        }
        .btn-icon:active { transform: scale(0.9); opacity: 1; color: var(--accent); }

        /* Bottom Controls */
        .bottom-dock {
            display: flex; flex-direction: column; gap: 10px;
            pointer-events: auto;
            align-items: center;
        }

        /* Quick Actions */
        .quick-actions {
            display: flex; gap: 10px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            padding: 8px 12px; border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .chip {
            background: rgba(255,255,255,0.1);
            border: none; color: var(--text-main);
            padding: 8px 14px; border-radius: 8px;
            font-size: 12px; font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        .chip:active { background: var(--accent); color: #000; }

        /* Main Toolbar */
        .toolbar {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 10px 20px; border-radius: 24px;
            display: flex; gap: 20px; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .tool-btn {
            background: none; border: none; font-size: 24px;
            cursor: pointer; position: relative;
            opacity: 0.6; transition: 0.2s;
        }
        .tool-btn.active { opacity: 1; transform: scale(1.1); }
        .tool-btn.active::after {
            content: ''; position: absolute; bottom: -5px; left: 50%;
            transform: translateX(-50%); width: 4px; height: 4px;
            background: var(--accent); border-radius: 50%;
        }

        /* Smart Type Overlay */
        #smart-type-overlay {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 400px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 10px;
            display: none;
            box-shadow: 0 10px 40px black;
            pointer-events: auto;
        }
        #smart-type-input {
            width: 100%; border: none; background: transparent;
            color: white; font-size: 16px; outline: none;
            padding: 5px;
        }

        /* Ripple Effect */
        .ripple {
            position: absolute; border-radius: 50%;
            background: rgba(0, 242, 255, 0.6);
            transform: scale(0);
            animation: ripple-anim 0.4s linear;
            pointer-events: none;
        }
        @keyframes ripple-anim {
            to { transform: scale(2); opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="screen-container">
        <img id="stream" src="/stream.mjpg" draggable="false" />
    </div>

    <div id="ui-layer">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="status-pill">
                <div class="dot"></div>
                <span>TESS Remote</span>
                <span class="mode-text" id="mode-label">TOUCH</span>
            </div>
            
            <button class="status-pill" onclick="stopShare()" style="background: rgba(255,0,0,0.2); border-color: rgba(255,0,0,0.3);">
                ❌ Stop
            </button>
        </div>

        <!-- Media Dock -->
        <div class="media-dock">
            <button class="btn-icon" onclick="send('media', 'vol_up')">➕</button>
            <button class="btn-icon" onclick="send('media', 'vol_down')">➖</button>
            <button class="btn-icon" onclick="send('media', 'mute')">🔇</button>
            <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 5px 0;"></div>
            <button class="btn-icon" onclick="send('media', 'play_pause')">⏯️</button>
            <button class="btn-icon" onclick="send('media', 'next')">⏭️</button>
        </div>

        <!-- Bottom Controls -->
        <div class="bottom-dock">
            <!-- Quick Actions -->
            <div class="quick-actions">
                <button class="chip" onclick="sendKey('win')">win</button>
                <button class="chip" onclick="sendKey('alt+tab')">switch</button>
                <button class="chip" onclick="sendKey('space')">space</button>
                <button class="chip" onclick="sendKey('enter')">enter</button>
                <button class="chip" onclick="sendKey('esc')">esc</button>
            </div>

            <!-- Main Toolbar -->
            <div class="toolbar">
                <button class="tool-btn active" id="btn-touch" onclick="setMode('touch')">👆</button>
                <button class="tool-btn" id="btn-trackpad" onclick="setMode('trackpad')">🖱️</button>
                <button class="tool-btn" onclick="toggleSmartType()">⌨️</button>
                <button class="tool-btn" onclick="sendKey('backspace')">⌫</button>
            </div>
        </div>
    </div>

    <!-- Smart Type Input -->
    <div id="smart-type-overlay">
        <form onsubmit="sendSmartType(event)">
            <input type="text" id="smart-type-input" placeholder="Type and press enter..." autocomplete="off">
        </form>
    </div>

    <script>
        const stream = document.getElementById('stream');
        const container = document.getElementById('screen-container');
        
        let state = {
            scale: 1,
            panning: false,
            pointX: 0, pointY: 0,
            startX: 0, startY: 0,
            mode: 'touch' // 'touch' or 'trackpad'
        }

        // --- Viewport Management (Zoom Fix) ---
        // Using CSS Matrix for smooth zoom/pan
        let transform = { x: 0, y: 0, k: 1 };

        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const xs = (e.clientX - transform.x) / transform.k;
            const ys = (e.clientY - transform.y) / transform.k;
            const delta = -e.deltaY;
            
            (delta > 0) ? (transform.k *= 1.1) : (transform.k /= 1.1);
            
            // Bounds Check for Zoom
            if (transform.k < 1) transform.k = 1;
            if (transform.k > 5) transform.k = 5;

            // Adjust scaling point
            transform.x = e.clientX - xs * transform.k;
            transform.y = e.clientY - ys * transform.k;

            applyTransform();
        }, { passive: false });

        function applyTransform() {
            stream.style.transform = `translate(${transform.x}px, ${transform.y}px) scale(${transform.k})`;
        }

        // --- Touch Gestures ---
        let pointers = [];
        let rLast = 0; // last rotation/distance

        container.addEventListener('pointerdown', (e) => {
            pointers.push(e);
            if (state.mode === 'touch' && pointers.length === 1) {
                // If single touch in Touch Mode, it might be a click
                state.startX = e.clientX;
                state.startY = e.clientY;
            }
        });

        container.addEventListener('pointermove', (e) => {
            // Update pointer spec
            for (let i = 0; i < pointers.length; i++) {
                 if (pointers[i].pointerId == e.pointerId) { pointers[i] = e; break; }
            }

            // Pinch / Pan Logic
            if (pointers.length === 2 && state.mode === 'touch') { 
                // We only do pinch zoom in Touch mode for now, or always?
                // Let's allow pinch always.
                const p1 = pointers[0];
                const p2 = pointers[1];
                
                // Calculate distance
                const dist = Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY);
                if (rLast === 0) rLast = dist;

                // Zoom center
                const cx = (p1.clientX + p2.clientX) / 2;
                const cy = (p1.clientY + p2.clientY) / 2;

                const delta = dist - rLast;
                if (Math.abs(delta) > 1) {
                     // Zoom
                     const xs = (cx - transform.x) / transform.k;
                     const ys = (cy - transform.y) / transform.k;
                     
                     transform.k *= (dist / rLast);
                     if (transform.k < 1) transform.k = 1;
                     
                     transform.x = cx - xs * transform.k;
                     transform.y = cy - ys * transform.k;
                     
                     applyTransform();
                }
                rLast = dist;
            } else if (pointers.length === 1 && state.mode === 'trackpad') {
                // Trackpad Move logic
                const dx = e.clientX - pointers[0].clientX; // Delta?
                // Actually need previous position. Pointer event gives movementX/Y but mobile support varies.
                // Simplified native trackpad logic:
                // ...
            }
        });

        container.addEventListener('pointerup', (e) => {
             // Cleanup pointer
             for (let i = 0; i < pointers.length; i++) {
                 if (pointers[i].pointerId == e.pointerId) { pointers.splice(i, 1); break; }
             }
             if (pointers.length < 2) rLast = 0;

             // Handle Click (if it was a tap)
             if (pointers.length === 0 && transform.k === 1) { // Only click if not zoomed
                 const dist = Math.hypot(e.clientX - state.startX, e.clientY - state.startY);
                 if (dist < 10) {
                     handleClick(e);
                 }
             }
        });

        // --- Interaction Logic ---

        function handleClick(e) {
            createRipple(e.clientX, e.clientY);
            
            if (state.mode === 'touch') {
                // Absolute Click
                const rect = stream.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                const y = (e.clientY - rect.top) / rect.height;
                send('input', { type: 'click', x, y });
            }
        }

        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);
        }

        // --- Mode Switching ---
        function setMode(mode) {
            state.mode = mode;
            document.getElementById('mode-label').innerText = mode;
            
            document.getElementById('btn-touch').classList.toggle('active', mode === 'touch');
            document.getElementById('btn-trackpad').classList.toggle('active', mode === 'trackpad');
            
            // Visual feedback
            const container = document.getElementById('screen-container');
            container.style.cursor = mode === 'trackpad' ? 'none' : 'default';
        }

        // --- Networking ---
        function send(endpoint, data) {
            // Support both (endpoint, data) and (type, data) shorthand
            let body = data;
            if (endpoint === 'input') {
                // formatting for input endpoint
            } else if (endpoint === 'media') {
               body = { type: 'media', action: data };
               endpoint = 'input';
            }

            fetch('/' + endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            }).catch(console.error);
        }

        function sendKey(key) {
            send('input', { type: 'key', key: key });
        }

        // --- Smart Type ---
        function toggleSmartType() {
            const el = document.getElementById('smart-type-overlay');
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
            if (el.style.display === 'block') document.getElementById('smart-type-input').focus();
        }

        function sendSmartType(e) {
            e.preventDefault();
            const val = document.getElementById('smart-type-input').value;
            send('input', { type: 'text', text: val });
            document.getElementById('smart-type-input').value = '';
            toggleSmartType();
        }

        function stopShare() {
            if (confirm("Stop Screen Sharing?")) fetch('/stop', { method: 'POST' });
        }

    </script>
</body>
</html>
